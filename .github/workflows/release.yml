name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: md-triage-windows
          - os: ubuntu-latest
            artifact_name: md-triage-linux
          - os: macos-latest
            artifact_name: md-triage-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,package]

      - name: Build executable
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "${{ matrix.artifact_name }}"
          run.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
